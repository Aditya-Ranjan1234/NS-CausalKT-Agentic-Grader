<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Knowledge Graph Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #container { width: 100%; height: 100%; }
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.98);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 1000;
            min-width: 280px;
        }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #333; }
        select, input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            background: white;
        }
        select:focus, input:focus { outline: none; border-color: #2196F3; box-shadow: 0 0 0 2px rgba(33,150,243,0.1); }
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(33,150,243,0.3); }
        #stats {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(255,255,255,0.98);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            line-height: 1.6;
            max-width: 280px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 2000;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="controls">
        <div class="control-group">
            <label for="domain">Domain</label>
            <select id="domain" onchange="switchDomain()">
                <option value="DSA">Data Structures & Algorithms</option>
                <option value="ML">Machine Learning</option>
            </select>
        </div>
        <div class="control-group">
            <label for="layout">Layout</label>
            <select id="layout" onchange="changeLayout()">
                <option value="force">Force</option>
                <option value="circular">Circular</option>
                <option value="grid">Grid</option>
                <option value="radial">Radial</option>
            </select>
        </div>
        <div class="control-group">
            <label for="filter">Edge Kind</label>
            <select id="filter" onchange="applyFilter()">
                <option value="">All</option>
                <option value="seed">Seed (Labeled)</option>
                <option value="inferred">Inferred</option>
            </select>
        </div>
        <div class="control-group">
            <button onclick="fitView()">Fit to View</button>
        </div>
        <div style="font-size: 11px; color: #666; margin-top: 10px; line-height: 1.5;">
            <strong>Controls:</strong><br>
            🖱️ Drag nodes<br>
            🔍 Scroll to zoom<br>
            👆 Click node for details
        </div>
    </div>
    <div id="stats"></div>
    <div id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Loading graph...</p>
    </div>

    <script>
        let graph = null;
        let rawData = null;
        let currentDomain = 'DSA';
        let allNodes = [];
        let allEdges = [];

        const colorMap = {
            seed: '#FF6B6B',
            inferred: '#4ECDC4'
        };

        async function loadDomain(domain) {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(`./${domain}/knowledge_graph.json`);
                rawData = await response.json();
                currentDomain = domain;
                
                // Transform data for G6
                allNodes = rawData.nodes.map((name, idx) => ({
                    id: idx.toString(),
                    label: name,
                    data: { name }
                }));

                allEdges = rawData.edges.map((edge, idx) => {
                    const fromIdx = rawData.nodes.indexOf(edge.source);
                    const toIdx = rawData.nodes.indexOf(edge.target);
                    return {
                        id: `edge${idx}`,
                        source: fromIdx.toString(),
                        target: toIdx.toString(),
                        data: {
                            kind: edge.kind,
                            origin: edge.origin,
                            weight: edge.weight
                        }
                    };
                });

                renderGraph();
                updateStats();
            } catch (e) {
                document.getElementById('stats').innerHTML = `<strong>Error:</strong> ${e.message}`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderGraph() {
            if (graph) {
                graph.destroy();
            }

            const filteredEdges = applyCurrentFilter();

            const nodes = new vis.DataSet(allNodes.map(n => ({
                id: n.id,
                label: n.label,
                title: n.label,
                color: '#2196F3',
                font: { size: 14 }
            })));

            const edges = new vis.DataSet(filteredEdges.map(e => {
                const kind = e.data?.kind || 'seed';
                return {
                    from: e.source,
                    to: e.target,
                    arrows: 'to',
                    color: { color: colorMap[kind] || '#999', opacity: 0.6 },
                    width: 1.5,
                    title: `${kind} (${e.data?.origin || ''})`
                };
            }));

            const container = document.getElementById('container');
            const data = { nodes, edges };
            const options = {
                physics: {
                    enabled: true,
                    stabilization: { iterations: 200 },
                    barnesHut: { gravitationalConstant: -26000, centralGravity: 0.3, springLength: 200 }
                },
                layout: { randomSeed: 42 },
                interaction: { hover: true, keyboard: true, navigationButtons: true, keyboard: true }
            };

            graph = new vis.Network(container, data, options);
        }

        function applyCurrentFilter() {
            const filterValue = document.getElementById('filter').value;
            if (!filterValue) return allEdges;
            return allEdges.filter(e => e.data?.kind === filterValue);
        }

        function applyFilter() {
            renderGraph();
        }

        function changeLayout() {
            // vis-network doesn't support dynamic layout switching easily
            // Force re-render with physics
            renderGraph();
        }

        function switchDomain() {
            loadDomain(document.getElementById('domain').value);
        }

        function fitView() {
            if (graph) {
                graph.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
            }
        }

        function updateStats() {
            const summary = rawData.summary || {};
            const nodeCount = allNodes.length;
            const edgeCount = applyCurrentFilter().length;
            
            document.getElementById('stats').innerHTML = `
                <strong>${currentDomain}</strong><br>
                Nodes: <strong>${nodeCount}</strong><br>
                Edges: <strong>${edgeCount}</strong><br>
                ─────<br>
                Seed: ${summary.seed_edge_count || 0}<br>
                Inferred: ${summary.inferred_edge_count || 0}<br>
                Cycles: ${summary.removed_cycle_edges || 0}
            `;
        }

        window.addEventListener('resize', () => {
            if (graph) {
                graph.setSize([window.innerWidth, window.innerHeight]);
            }
        });

        // Load initial domain
        loadDomain('DSA');
    </script>
</body>
</html>
